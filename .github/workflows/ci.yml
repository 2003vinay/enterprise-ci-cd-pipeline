name: CI Pipeline

on: 
  push:
    branches:
       - main

  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
          matrix:
            python-version: ["3.10", "3.11", "3.12"]
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Setup python
            uses: actions/setup-python@v5
            with:
                python-version: ${{matrix.python-version}}

          - name: Login to Docker hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Build Docker image
            run: |
              docker build -t ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest .

          - name: Push Docker image
            run: |
              docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest

          - name: Cache pip packages
            uses: actions/cache@v4
            with:
              path: ~/.cache/pip
              key: ${{runner.os}}-pip-${{hashFiles('**requirements.txt')}}

          - name: Verify python
            run: |
              python --version
              pip --version

          - name: Install dependencies
            run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

          - name: verify installed packages
            run: |
             pip list

          - name: Run Unit Tests
            run: |
              export PYTHONPATH=.
              pytest -v --junitxml=test-results.xml

          - name: Upload Test report 
            uses: actions/upload-artifact@v4
            with:
              name: test-report
              path: test-results.xml

          - name: Verify repository
            run: |
             pwd
             ls -la

          - name: Deploy to EC2
            uses: appleboy/ssh-action@v1.0.3
            with:
              host: ${{ secrets.EC2_HOST}}
              username: ${{ secrets.EC2_USERNAME }}  
              key: ${{ secrets.EC2_SSH_KEY }}
              script: |
                 sudo docker pull ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest
                 
                 sudo docker stop enterprise-app || true 
                 sudo docker rm enterprise-app || true

                 sudo docker run -d\
                  --name enterprise-app \
                  -p 5000:5000 \
                  ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest
