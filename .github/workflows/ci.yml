name: CI Pipeline

on: 
  push:
    branches:
       - main

  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Setup python
            uses: actions/setup-python@v5
            with:
                python-version: "3.12"

          - name: Verify python
            run: |
              python --version
              pip --version

          - name: Verify repository
            run: |
             pwd
             ls -la
