name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=.
          pytest -v --junitxml=test-results.xml

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-results.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest .
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:1.2.0 .



      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:1.2.0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest
            sudo docker stop enterprise-app || true
            sudo docker rm enterprise-app || true
            sudo docker run -d \
            --name enterprise-app \
            -p 5000:5000 \
            -e APP_VERSION=1.2.0 \
            -e ENVIRONMENT=Production \
            ${{ secrets.DOCKER_USERNAME }}/enterprise-ci-cd:latest